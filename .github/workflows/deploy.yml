name: Deploy to Heroku

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Heroku deploy action uses Node; opt into Node 24 before GitHub makes it default (avoids Node 20 deprecation noise).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest does not ship Heroku CLI; akhileshns/heroku-deploy shells out to `heroku` (e.g. heroku create).
      - name: Install Heroku CLI
        if: github.event_name == 'push'
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy to Heroku
        if: github.event_name == 'push'
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: automations-task-generator
          heroku_email: ${{secrets.HEROKU_EMAIL}}
          buildpack: python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set Heroku config vars
        if: github.event_name == 'push'
        run: |
          curl -sS -f -X PATCH https://api.heroku.com/apps/automations-task-generator/config-vars \
            -H "Authorization: Bearer ${{secrets.HEROKU_API_KEY}}" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Content-Type: application/json" \
            -d '{
              "JIRA_BASE_URL": "${{secrets.JIRA_BASE_URL}}",
              "JIRA_USER_EMAIL": "${{secrets.JIRA_USER_EMAIL}}",
              "JIRA_API_TOKEN": "${{secrets.JIRA_API_TOKEN}}",
              "JIRA_PROJECT_KEY": "${{secrets.JIRA_PROJECT_KEY}}",
              "JIRA_BOARD_ID": "${{secrets.JIRA_BOARD_ID}}",
              "CREATEBYTES_WORKSPACE_URL": "${{secrets.CREATEBYTES_WORKSPACE_URL}}",
              "CREATEBYTES_EMAIL": "${{secrets.CREATEBYTES_EMAIL}}",
              "CREATEBYTES_PASSWORD": "${{secrets.CREATEBYTES_PASSWORD}}",
              "CREATEBYTES_PROJECT_ID": "${{secrets.CREATEBYTES_PROJECT_ID}}"
            }'
