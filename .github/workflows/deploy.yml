name: Deploy to Heroku

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Heroku
        if: github.event_name == 'push'
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{secrets.HEROKU_API_KEY}}
          heroku_app_name: automations-task-generator
          heroku_email: your-email@example.com
          buildpack: python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set Heroku config vars
        if: github.event_name == 'push'
        run: |
          curl -X PATCH https://api.heroku.com/apps/automations-task-generator/config-vars \
            -H "Authorization: Bearer ${{secrets.HEROKU_API_KEY}}" \
            -H "Content-Type: application/json" \
            -d '{
              "JIRA_BASE_URL": "https://your-site.atlassian.net/",
              "JIRA_USER_EMAIL": "${{secrets.JIRA_USER_EMAIL}}",
              "JIRA_API_TOKEN": "${{secrets.JIRA_API_TOKEN}}",
              "JIRA_PROJECT_KEY": "YOUR_PROJECT_KEY",
              "JIRA_BOARD_ID": "22",
              "CREATEBYTES_WORKSPACE_URL": "https://cb.workspace.createbytes.com",
              "CREATEBYTES_EMAIL": "${{secrets.CREATEBYTES_EMAIL}}",
              "CREATEBYTES_PASSWORD": "${{secrets.CREATEBYTES_PASSWORD}}",
              "CREATEBYTES_PROJECT_ID": "your-cb-project-uuid"
            }'
